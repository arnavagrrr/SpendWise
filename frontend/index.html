<!DOCTYPE html>
<html>
<head>
    <title>SpendWise - AI Financial Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            margin: 0;
            padding: 0;
            color: #e2e8f0;
        }

        .container {
            max-width: 800px;
            margin: 50px auto;
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.6);
        }

        h1 {
            margin-bottom: 5px;
            color: #f8fafc;
        }

        .subtitle {
            color: #94a3b8;
            margin-bottom: 20px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .clear-btn {
            background: #ef4444;
        }

        .clear-btn:hover {
            background: #dc2626;
        }

        /* Dashboard */
        .dashboard {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .card {
            flex: 1;
            background: #334155;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .card h3 {
            margin: 0;
            font-size: 14px;
            color: #94a3b8;
        }

        .card p {
            font-size: 20px;
            font-weight: bold;
            margin-top: 5px;
            color: #f1f5f9;
        }

        /* Input */
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #475569;
            background: #0f172a;
            color: white;
        }

        input::placeholder {
            color: #64748b;
        }

        button {
            padding: 10px 15px;
            border: none;
            background: #22c55e;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }

        /* List */
        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #334155;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
        }

        .tag {
            font-weight: bold;
        }

        .want {
            color: #ef4444;
        }

        .need {
            color: #22c55e;
        }

        /* Chart */
        .chart-container {
            margin-top: 30px;
        }

    </style>
</head>

<body>

<div class="container">

    <div class="top-bar">
        <div>
            <h1>SpendWise 💰</h1>
            <p class="subtitle">Track and analyze your spending</p>
        </div>
        <button class="clear-btn" onclick="clearAll()">Clear All</button>
    </div>

    <!-- Dashboard -->
    <div class="dashboard">
        <div class="card">
            <h3>Total</h3>
            <p id="total">₹0</p>
        </div>
        <div class="card">
            <h3>Want</h3>
            <p id="want">₹0</p>
        </div>
        <div class="card">
            <h3>Need</h3>
            <p id="need">₹0</p>
        </div>
    </div>

    <!-- Input -->
    <div class="input-group">
        <input type="text" id="desc" placeholder="Description">
        <input type="number" id="amount" placeholder="Amount">
        <button onclick="addTransaction()">Add</button>
    </div>

    <!-- List -->
    <ul id="list"></ul>

    <!-- Chart -->
    <div class="chart-container">
        <canvas id="chart"></canvas>
    </div>

</div>

<script>
const API = "http://127.0.0.1:8000/api";

let chart;

async function addTransaction() {
    const description = document.getElementById("desc").value;
    const amount = document.getElementById("amount").value;

    if (!description || !amount) return;

    await fetch(`${API}/add/`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ description, amount })
    });

    document.getElementById("desc").value = "";
    document.getElementById("amount").value = "";

    loadTransactions();
}

async function clearAll() {
    await fetch(`${API}/clear/`, {
        method: "DELETE"
    });

    loadTransactions();
}

async function loadTransactions() {
    const res = await fetch(`${API}/all/`);
    const data = await res.json();

    const list = document.getElementById("list");
    list.innerHTML = "";

    let total = 0;
    let want = 0;
    let need = 0;
    let categoryMap = {};

    data.reverse().forEach(t => {
        total += t.amount;

        if (t.tag === "Want") want += t.amount;
        else need += t.amount;

        categoryMap[t.category] = (categoryMap[t.category] || 0) + t.amount;

        const li = document.createElement("li");

        const tagClass = t.tag === "Want" ? "want" : "need";

        li.innerHTML = `
            <span>${t.description} - ₹${t.amount}</span>
            <span class="tag ${tagClass}">${t.category} | ${t.tag}</span>
        `;

        list.appendChild(li);
    });

    // Dashboard
    document.getElementById("total").innerText = `₹${total}`;
    document.getElementById("want").innerText = `₹${want}`;
    document.getElementById("need").innerText = `₹${need}`;

    // Chart
    const labels = Object.keys(categoryMap);
    const values = Object.values(categoryMap);

    if (chart) chart.destroy();

    const ctx = document.getElementById('chart').getContext('2d');

    chart = new Chart(ctx, {
        type: 'pie',
        data: {
            labels: labels,
            datasets: [{
                data: values
            }]
        },
        options: {
            plugins: {
                legend: {
                    labels: {
                        color: "#e2e8f0"
                    }
                }
            }
        }
    });
}

loadTransactions();
</script>

</body>
</html>
